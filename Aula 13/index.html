    <title>Exercícios Flexbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Exercício 1 e 4: Flexbox Alinhado à Direita</h2>

        <div class="item-ex2 color2">Item B</div>

    </div>

    <hr>

    <h2>Exercício 3: Terceiro item com crescimento duplo</h2>
    <div class="container-ex3">
        <div class="item-ex3">1</div>
        <div class="item-ex3">2</div>
        <div class="item-ex3 especial">3 (Flex-grow: 2)</div>
        <div class="item-ex3">4</div>
        <div class="item-ex3">5</div>
    </div>

</body>
</html>
