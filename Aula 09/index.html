<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>

<body>
    <form>
        <table border="1" cellpadding="5" colpadding="0">
            <tr>
                <td><label for="nome">Nome</label></td>
                <td><input type="text" id="nome" name="nome"></td>
            </tr>
            <tr>
                <td> <label for="email">Email pessoal</label></td>
                <td><input type="email" id="email" name="email"></td>
            </tr>
            <tr>
                <td><label for="Senha">Senha</label></td>
                <td><input type="password" id="Senha" name="Senha"></td>
            </tr>
            <tr>
                <td><label for="Idade">Idade</label></td>
                <td><input type="text" id="Idade" name="Idade"></td>
            </tr>
            <tr>
                <td colspan="2">
                    <label for="Comentario">Deixe um comentário</label><br>
                    <textarea name="Comentario" cols="50" rows="10" placeholder="Escreva aqui um comentário"></textarea>
                </td>
                <br>
            </tr>
            <tr>
                <td>
                    <label for="interesse">Material de Interesse:</label>
                    <br>
                    <input type="checkbox" id="Backend" name="Backend"> Backend <br>
                    <input type="checkbox" id="Frontend" name="Frontend"> FrontEnd <br>
                    <input type="checkbox" id="Fullstack" name="Fullstack">FullStack <br>
                </td>
                <td>
                    <label for="Tipo de Viagem">Tipo de Viagem</label>
                    <br>
                    <input type="radio" id="Negocios" name="Negocios"> Negócios <br>
                    <input type="radio" id="Lazer" name="Lazer"> Lazer <br>
                    <input type="radio" id="Turismo" name="Turismo"> Turismo <br>
                    <input type="radio" id="Academico" name="Academico"> Acadêmico <br>
                </td>
            </tr>

            <tr>
                <td>
                    <label for="Esporte Favorito">Esporte Favorito</label>
                    <select name="Esporte" id="Esporte" size="4" multiple>
                        <option value="Selecione">Selecione</option>
                        <option value="Futebol">Futebol</option>
                        <option value="Basquete">Basquete</option>
                        <option value="Volei">Vôlei</option>
                        <option value="Tenis">Tênis</option>
                    </select>
                </td>
                <td>
                    <label for="Investimentos">Investimentos</label>
                    <select name="Investimentos" id="Investimentos" size="1">
                        <option value="Poupanca">Poupança</option>
                        <option value="CDB">CDB</option>
                        <option value="Tesouro Direto">Tesouro Direto</option>
                        <option value="Fundos Imobiliarios">Fundos Imob.</option>
                        <option value="CDI">CDI</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>
                    <label for="Cor">Escolha um cor</label>
                    <input type="color" name="Cor" id="Cor">
                </td>
                <td>
                    <label for="file">Selecione o arquivo</label>
                    <input type="file" name="file" id="file">
                </td>
            </tr>
            <tr>
                <td colspan="2"> <label for="data">Data e Hora envio:</label>
                    <input type="datetime-local" name="data" id="data">
                </td>
            </tr>

            <tr>
               <td> <input type="submit" value="Enviar"> </td>
               <td><input type="reset" value="Limpar"> </td> 
                
            </tr>

        </table>
    </form>
</body>

</html>
